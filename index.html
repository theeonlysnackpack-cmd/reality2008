<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALITY_OS v4.0 | AERO-TECH</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body class="booting">
    <div id="kernel-loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <h1 class="glitch">welcome to reality(2008)</h1>
            <p id="boot-log">INITIALIZING KERNEL...</p>
        </div>
    </div>

    <div id="perspective-wrapper">
        <div id="spotlight-overlay"></div>
        
        <div id="splash-screen" class="glass-morph">
            <div class="auth-box">
                <h2 class="aero-text">SECURE LOGIN</h2>
                <input type="text" id="username-input" placeholder="IDENTITY" autocomplete="off">
                <button id="start-btn" class="aero-btn">AUTHENTICATE</button>
            </div>
        </div>

        <div id="os-interface" class="hidden">
            <canvas id="background-waves"></canvas>
            
            <aside id="sidebar-aero">
                <div class="sidebar-top">
                    <div class="user-chip">
                        <div id="user-avatar"></div>
                        <span id="display-name">---</span>
                    </div>
                    <div id="os-clock">00:00</div>
                </div>
                
                <nav id="os-nav">
                    <div class="nav-btn active" data-view="feed"><span>CORE FEED</span></div>
                    <div class="nav-btn" data-view="communities"><span>POCKETS</span></div>
                    <div class="nav-btn" data-view="apps"><span>SYSTEM APPS</span></div>
                    <div class="nav-btn" data-view="tv"><span>REALITY TV</span></div>
                    <div class="nav-btn" data-view="snackpack"><span>SNACKPACK</span></div>
                    <div class="nav-btn" data-view="profile"><span>IDENTITY</span></div>
                    <div class="nav-btn" data-view="settings"><span>CONFIG</span></div>
                </nav>

                <div class="sidebar-bottom">
                    <div class="storage-bar"><div id="storage-fill"></div></div>
                    <button id="shutdown-btn">DISCONNECT</button>
                </div>
            </aside>

            <main id="workspace">
                <div id="view-layer"></div>
                <div id="window-layer"></div>
            </main>

            <div id="task-dock">
                <div id="start-orb">R</div>
                <div id="running-tasks"></div>
            </div>
        </div>
    </div>

    <!-- Admin Access Modal -->
    <div id="admin-gate" class="modal hidden">
        <div class="modal-inner glass-morph">
            <h3>ENCRYPTED ACCESS</h3>
            <input type="password" id="admin-pass" placeholder="KEYPHRASE">
            <button id="admin-unlock" class="aero-btn">DECRYPT</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

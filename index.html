<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reality (2008)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="light-mode">
    <div id="spotlight-overlay"></div>

    <div id="splash-screen">
        <div class="splash-content">
            <h1 class="glitch" data-text="welcome to reality(2008)">welcome to reality(2008)</h1>
            <div class="login-box">
                <input type="text" id="username-input" placeholder="USERNAME" maxlength="15">
                <button id="start-btn">ENTER REALITY</button>
            </div>
        </div>
    </div>

    <div id="app-shell" class="hidden">
        <div class="scanlines"></div>
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="logo">REALITY</div>
            </div>
            <div id="tv-scroll-container">
                <nav id="tv-scroll">
                    <div class="nav-item active" data-view="feed">
                        <span class="nav-icon">▤</span> FEED
                    </div>
                    <div class="nav-item" data-view="communities">
                        <span class="nav-icon">❒</span> COMMUNITIES
                    </div>
                    <div class="nav-item" data-view="apps">
                        <span class="nav-icon">◈</span> 50+ APPS
                    </div>
                    <div class="nav-item" data-view="tv">
                        <span class="nav-icon">📺</span> TV SHOWS
                    </div>
                    <div class="nav-item" data-view="snackpack">
                        <span class="nav-icon">🔒</span> ONLYSNACKPACK
                    </div>
                    <div class="nav-item" data-view="profile">
                        <span class="nav-icon">👤</span> PROFILE
                    </div>
                    <div class="nav-item" data-view="settings">
                        <span class="nav-icon">⚙</span> SETTINGS
                    </div>
                </nav>
            </div>
            <div class="sidebar-footer">
                <div id="current-user-display">Guest</div>
                <button id="logout-btn">DISCONNECT</button>
            </div>
        </aside>

        <main id="main-content">
            <div id="view-container"></div>
        </main>
    </div>

    <!-- Modals -->
    <div id="password-modal" class="modal hidden">
        <div class="modal-content">
            <h2>ACCESS DENIED</h2>
            <p>Enter administrative password for ONLYSNACKPACK:</p>
            <input type="password" id="admin-pass-input">
            <div class="modal-actions">
                <button id="modal-cancel">BACK</button>
                <button id="modal-submit">AUTHENTICATE</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
